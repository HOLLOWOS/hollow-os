---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
- id:     depicker
  module: notesqml
  config: notesqml-depicker.conf
- id:     hardwarescan
  module: notesqml
  config: notesqml-hardwarescan.conf
- id:     software
  module: notesqml
  config: notesqml-software.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - notesqml@depicker
    - notesqml@hardwarescan
    - notesqml@software
    - users
    - summary

  - exec:
    - mount
    - unpackfs
    - fstab
    - locale
    - keyboard
    - localecfg
    - networkcfg
    - hwclock
    - users
    - shellprocess@shellprocess-hollow
    - umount

branding: hollowos
prompt-install: true
dont-chroot: false
disable-cancel: false
disable-cancel-during-exec: true
