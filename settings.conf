# HollowOS Calamares settings.conf
# Uses built-in modules only for Alpha

---

modules-search: [ local, /usr/lib64/calamares/modules, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - packages
    - shellprocess-limine
    - shellprocess-hollow
    - umount

branding: hollowos

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: true
