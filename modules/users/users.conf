# HollowOS users module config
---
defaultGroups:
  - name: users
    must_exist: false
    system: false
  - name: lp
    must_exist: false
    system: false
  - name: video
    must_exist: false
    system: false
  - name: network
    must_exist: false
    system: false
  - name: storage
    must_exist: false
    system: false
  - name: wheel
    must_exist: false
    system: false
  - name: audio
    must_exist: false
    system: false
  - name: optical
    must_exist: false
    system: false
  - name: scanner
    must_exist: false
    system: false

autologinGroup:  autologin
doAutologin:     false

sudoersGroup:    wheel
setRootPassword: true

passwordRequirements:
  minLength: 6
  maxLength: -1

allowWeakPasswords: false
allowWeakPasswordsDefault: false

# User shell is set by hollow.json orchestrator post-install
userShell: /bin/bash
