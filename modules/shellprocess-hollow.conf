# HollowOS hollow-generate shellprocess module
# Runs hollow-generate.js after packages are installed
# This is what writes /etc/hollow.json to the new system

---

script:
  # Pass all installer choices as environment variables to hollow-generate.js
  - name: "hollow-generate"
    command: >
      HOLLOW_USER=$(getent passwd 1000 | cut -d: -f1)
      HOLLOW_HOSTNAME=$(cat /etc/calamares/hostname 2>/dev/null || echo "hollowos")
      HOLLOW_LOCALE=$(cat /etc/calamares/locale 2>/dev/null || echo "en_US.UTF-8")
      HOLLOW_TIMEZONE=$(cat /etc/calamares/timezone 2>/dev/null || echo "UTC")
      HOLLOW_KEYBOARD=$(cat /etc/calamares/keyboard 2>/dev/null || echo "us")
      HOLLOW_DESKTOP=${CALAMARES_GLOBAL_desktopEnvironment:-kde}
      HOLLOW_SHELL=${CALAMARES_GLOBAL_shell:-fish}
      HOLLOW_BROWSER=${CALAMARES_GLOBAL_browser:-firefox}
      HOLLOW_THEME=${CALAMARES_GLOBAL_theme:-dark}
      HOLLOW_UNFREE=${CALAMARES_GLOBAL_unfree:-false}
      HOLLOW_FLATPAK=${CALAMARES_GLOBAL_flatpak:-true}
      HOLLOW_SSH=${CALAMARES_GLOBAL_ssh:-false}
      HOLLOW_ZRAM=${CALAMARES_GLOBAL_zram:-true}
      HOLLOW_AUTOLOGIN=${CALAMARES_GLOBAL_autologin:-false}
      HOLLOW_DRIVERS=auto
      HOLLOW_DRIVER_PKGS="${CALAMARES_GLOBAL_detectedDriverPackages:-mesa vulkan-loader}"
      HOLLOW_VERSION="2025.1"
      CALAMARES_ROOT="${ROOT:-/mnt}"
      bun /usr/lib/calamares/modules/hollow-generate.js
    timeout: 120
