# HollowOS packages module config
# Package groups are conditionally applied based on hollow.json selections
---

backend: xbps

# Run before installing packages
update_db: true

operations:
  - install:
    # ── Base system ──────────────────────────────────────
    - base-system
    - void-repo-nonfree
    - curl
    - git
    - bun
    - fish-shell
    - bash
    - zsh
    - NetworkManager
    - network-manager-applet
    - dbus
    - elogind
    - polkit
    - rtkit
    - pipewire
    - wireplumber
    - alsa-utils
    - xdg-user-dirs
    - xdg-utils
    - mesa
    - vulkan-loader

    # ── Fonts ────────────────────────────────────────────
    - noto-fonts-ttf
    - noto-fonts-emoji
    - liberation-fonts-ttf

    # ── Hollow orchestrator ──────────────────────────────
    - hollow-orchestrator

# ── Desktop environment groups (conditional) ─────────────
# Applied by hollow-generate script based on user DE choice

groups:
  kde:
    - kde5
    - kde5-baseapps
    - sddm
    - xorg
    - plasma-pa
    - plasma-nm
    - dolphin
    - konsole
    - kate

  gnome:
    - gnome
    - gnome-apps
    - gdm
    - xorg
    - gnome-terminal
    - nautilus
    - gedit

  hyprland:
    - hyprland
    - waybar
    - wofi
    - dunst
    - kitty
    - swaybg
    - grim
    - slurp
    - wl-clipboard
    - polkit-gnome

  sway:
    - sway
    - swaybar
    - waybar
    - dmenu
    - foot
    - dunst
    - swaylock
    - swayidle
    - wl-clipboard

# ── Browser groups ───────────────────────────────────────
  firefox:
    - firefox

  librewolf:
    - librewolf

  zen:
    - zen-browser

# ── Driver groups ────────────────────────────────────────
  nvidia:
    - nvidia
    - nvidia-libs

  amd:
    - mesa
    - vulkan-radeon
    - xf86-video-amdgpu

  intel:
    - mesa
    - vulkan-intel
    - xf86-video-intel

  broadcom-wifi:
    - broadcom-wl-dkms

# ── Optional extras ──────────────────────────────────────
  flatpak:
    - flatpak
